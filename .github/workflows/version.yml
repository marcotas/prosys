name: Version & Tag

on:
  push:
    branches:
      - main

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - run: pnpm install

      - name: Generate SvelteKit types
        run: pnpm exec svelte-kit sync

      - id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
          title: 'Version Packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # When the version PR was just merged (no changesets remain),
      # tag the release and dispatch the Release workflow to build artifacts.
      - name: Tag release
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
          fi

      - name: Trigger release build
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          # Only dispatch if we actually created a new tag
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            gh workflow run release.yml --repo ${{ github.repository }} --ref "$TAG"
            echo "Dispatched release build for $TAG"
          fi
